{{- if .Values.clock.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "lago.fullname" . }}-clock
  labels:
    {{- include "lago.labels" . | nindent 4 }}
    app.kubernetes.io/component: clock
spec:
  # The scheduler must be a singleton — exactly one replica.
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "lago.selectorLabels" . | nindent 6 }}
      app.kubernetes.io/component: clock
  template:
    metadata:
      labels:
        {{- include "lago.selectorLabels" . | nindent 8 }}
        app.kubernetes.io/component: clock
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: clock
          image: {{ include "lago.image.api" . | quote }}
          imagePullPolicy: {{ .Values.image.api.pullPolicy }}
          command: {{ toJson .Values.clock.cmd }}
          envFrom:
            - configMapRef:
                name: {{ include "lago.fullname" . }}-env
            - secretRef:
                name: {{ .Values.existingSecret }}
{{- end }}
