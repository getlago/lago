{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "lago.fullname" . }}
  labels:
    {{- include "lago.labels" . | nindent 4 }}
  {{- with .Values.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.domain | quote }}
      secretName: {{ .Values.ingress.tlsSecretName }}
  {{- end }}
  rules:
    - host: {{ .Values.domain | quote }}
      http:
        paths:
          # API + GraphQL go to the API service; everything else to the front.
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "lago.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /graphql
            pathType: Prefix
            backend:
              service:
                name: {{ include "lago.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /rails
            pathType: Prefix
            backend:
              service:
                name: {{ include "lago.fullname" . }}-api
                port:
                  number: {{ .Values.api.port }}
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "lago.fullname" . }}-front
                port:
                  number: {{ .Values.front.port }}
{{- end }}
